<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4K Video Upscaler - SaaS Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .drag-active {
            background-color: rgba(59, 130, 246, 0.2);
            border-color: #3b82f6;
        }
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-2xl w-full bg-gray-800 rounded-2xl shadow-2xl p-8 border border-gray-700">
            <h1 class="text-3xl font-bold text-center mb-2 bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
                4K Video Upscaler
            </h1>
            <p class="text-center text-gray-400 mb-8">Lanczos scaling + Unsharp mask • Instant 4K for social media</p>

            <!-- Drag & Drop Area -->
            <div id="dropzone" class="border-2 border-dashed border-gray-600 rounded-xl p-10 text-center cursor-pointer transition-all hover:border-blue-500 bg-gray-850">
                <svg class="w-12 h-12 mx-auto text-gray-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                </svg>
                <p class="text-lg font-medium">Drag & drop your video here</p>
                <p class="text-sm text-gray-500 mt-1">or click to browse (MP4, MOV, AVI, MKV, WEBM) – max 50MB</p>
                <input type="file" id="fileInput" class="hidden" accept="video/mp4,video/quicktime,video/x-msvideo,video/x-matroska,video/webm">
                <p id="fileName" class="mt-3 text-sm text-blue-400 hidden"></p>
            </div>

            <!-- Processing Spinner -->
            <div id="processingSpinner" class="hidden mt-6 text-center">
                <div class="spinner mx-auto"></div>
                <p class="mt-3 text-gray-300">Upscaling to 4K... This may take a few minutes.</p>
            </div>

            <!-- Download Button (hidden until ready) -->
            <div id="downloadContainer" class="hidden mt-6 text-center">
                <a id="downloadBtn" href="#" download class="inline-block bg-green-600 hover:bg-green-700 text-white font-semibold py-3 px-8 rounded-lg shadow-lg transition transform hover:scale-105">
                    ⬇️ Download 4K Video
                </a>
            </div>

            <!-- Backend Check Button & Status -->
            <div class="mt-8 pt-6 border-t border-gray-700 flex flex-col items-center">
                <button id="checkBackendBtn" class="bg-gray-700 hover:bg-gray-600 text-white py-2 px-5 rounded-lg transition flex items-center gap-2">
                    <span>🔍 Check Backend Status</span>
                </button>
                <div id="backendStatus" class="mt-3 text-sm font-mono"></div>
            </div>

            <p class="text-xs text-gray-600 text-center mt-8">Max 50MB • Processed with FFmpeg Lanczos 4K + unsharp</p>
        </div>
    </div>

    <script>
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const fileNameSpan = document.getElementById('fileName');
        const processingSpinner = document.getElementById('processingSpinner');
        const downloadContainer = document.getElementById('downloadContainer');
        const downloadBtn = document.getElementById('downloadBtn');
        const checkBackendBtn = document.getElementById('checkBackendBtn');
        const backendStatusDiv = document.getElementById('backendStatus');

        let currentDownloadId = null;

        // Drag & Drop handlers
        dropzone.addEventListener('click', () => fileInput.click());
        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('drag-active');
        });
        dropzone.addEventListener('dragleave', () => {
            dropzone.classList.remove('drag-active');
        });
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('drag-active');
            const files = e.dataTransfer.files;
            if (files.length > 0) handleFile(files[0]);
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            const validTypes = ['video/mp4', 'video/quicktime', 'video/x-msvideo', 'video/x-matroska', 'video/webm'];
            if (!validTypes.includes(file.type) && !file.name.match(/\.(mp4|mov|avi|mkv|webm)$/i)) {
                alert('Unsupported file format. Please upload MP4, MOV, AVI, MKV, or WEBM.');
                return;
            }
            if (file.size > 50 * 1024 * 1024) {
                alert('File too large. Max 50MB allowed.');
                return;
            }
            fileNameSpan.textContent = file.name;
            fileNameSpan.classList.remove('hidden');
            uploadFile(file);
        }

        async function uploadFile(file) {
            // Hide any previous download button, show spinner
            downloadContainer.classList.add('hidden');
            currentDownloadId = null;
            processingSpinner.classList.remove('hidden');

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/upload', { method: 'POST', body: formData });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'Upload failed');
                if (data.success && data.download_id) {
                    currentDownloadId = data.download_id;
                    downloadBtn.href = `/download/${currentDownloadId}`;
                    downloadContainer.classList.remove('hidden');
                } else {
                    throw new Error(data.error || 'Unknown error');
                }
            } catch (err) {
                alert(`Error: ${err.message}`);
            } finally {
                processingSpinner.classList.add('hidden');
            }
        }

        // Backend check with loading spinner
        async function checkBackend() {
            backendStatusDiv.innerHTML = '<span class="inline-block w-4 h-4 border-2 border-gray-500 border-t-blue-500 rounded-full animate-spin mr-1"></span> Checking...';
            try {
                const response = await fetch('/check');
                const data = await response.json();
                if (response.ok && data.status === 'active' && data.ffmpeg === true) {
                    backendStatusDiv.innerHTML = '✅ Backend is ACTIVE & FFmpeg ready';
                } else if (data.ffmpeg === false) {
                    backendStatusDiv.innerHTML = '⚠️ Backend awake but FFmpeg missing (contact admin)';
                } else {
                    backendStatusDiv.innerHTML = '❌ Backend not active or unreachable';
                }
            } catch (err) {
                backendStatusDiv.innerHTML = '❌ Cannot connect to backend (server may be sleeping)';
            }
        }

        checkBackendBtn.addEventListener('click', checkBackend);
        // Optional: auto-check on page load
        checkBackend();
    </script>
</body>
</html>
