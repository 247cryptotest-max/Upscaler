services:
  - type: web
    name: 4k-video-upscaler
    runtime: python
    buildCommand: |
      apt-get update && apt-get install -y ffmpeg
      pip install -r requirements.txt
    startCommand: gunicorn main:app --timeout 600 --workers 1 --threads 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    plan: free
    healthCheckPath: /check
    autoDeploy: true
